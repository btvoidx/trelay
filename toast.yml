image: golang:1.18.3

tasks:
  install-deps:
    command: |
      go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      go install gotest.tools/gotestsum@latest

  install-packages:
    input_paths: [go.mod, go.sum]
    command: go mod download

  test:
    description: Run tests
    dependencies:
      - install-deps
      - install-packages
    input_paths: [.]
    command: gotestsum --format pkgname

  lint:
    description: Run golangci linter
    dependencies:
      - install-deps
      - install-packages
    input_paths: [.]
    command: golangci-lint run

  build:
    description: Build trelay command-line binaries
    cache: false
    dependencies:
      - install-deps
    input_paths: [.]
    output_paths: [./bin]
    command: |
      go build -o ./bin ./cmd/trelay
